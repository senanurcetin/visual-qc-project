name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile main.py case_study.py
          python -m py_compile analysis/run_neu_case_study.py
          python -m py_compile analysis/generate_visuals.py

      - name: Generate visualization assets
        run: python analysis/generate_visuals.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Import app
        run: python -c "import main; print(main.app.name)"
